name: Android Release

on:
  push:
    branches:
      - main
    paths:
      - pubspec.yaml

permissions:
  contents: write

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version change
        id: version
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | head -n 1)"
          if [ -z "$current_version" ]; then
            echo "::error::Unable to read version from pubspec.yaml"
            exit 1
          fi

          echo "version=$current_version" >> "$GITHUB_OUTPUT"

          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          zero_sha="0000000000000000000000000000000000000000"

          if [ "$before" = "$zero_sha" ]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              before="$(git rev-parse HEAD^)"
            else
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if git diff --quiet "$before" "$after" -- pubspec.yaml; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous_version="$(
            git show "$before:pubspec.yaml" 2>/dev/null \
              | sed -n 's/^version:[[:space:]]*//p' \
              | head -n 1 \
              || true
          )"

          if [ "$current_version" = "$previous_version" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-release:
    needs: detect-version
    if: needs.detect-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.detect-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate Android signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          for secret_name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::$secret_name is not set"
              exit 1
            fi
          done

      - name: Decode Android keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Build split release APKs
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release --split-per-abi --target-platform android-arm,android-arm64

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "dist/podomoro-${APP_VERSION}-android-arm64-v8a-release.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "dist/podomoro-${APP_VERSION}-android-armeabi-v7a-release.apk"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: Podomoro v${{ env.APP_VERSION }}
          generate_release_notes: true
          files: |
            dist/podomoro-${{ env.APP_VERSION }}-android-arm64-v8a-release.apk
            dist/podomoro-${{ env.APP_VERSION }}-android-armeabi-v7a-release.apk
